[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"

# Proxy API calls through Netlify's own domain instead of hitting the Render
# backend cross-origin. The backend's refresh-token cookie only survives a
# reload if the browser treats it as first-party — cross-site cookies rely on
# SameSite=None, which is exactly what Chrome's third-party-cookie blocking
# targets. Routing through this same-origin path (status = 200 makes Netlify
# proxy the request server-side rather than redirect the browser) means the
# Set-Cookie response is seen as coming from this site, not onrender.com.
[[redirects]]
  from = "/api/*"
  to = "https://final-caa-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Static assets from Vite are content-hashed (e.g. /assets/index-abc123.js)
# so they can be cached for one year. Safe because the hash changes on every build.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts and images in /public are not hashed — cache them for a short time only.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# All HTML pages and SSR responses must be revalidated on every load.
# This ensures users always get the latest deploy rather than a stale cached page.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
